name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Build Astro site
        uses: withastro/action@v5
        with:
          path: ./website
        env:
          # Activates privacy-respecting Plausible analytics + flips the privacy
          # page copy in lockstep. Unset by default => OFF (site ships no
          # analytics). To enable: create the drobu.app site in Plausible, then
          # set repo Actions variable PUBLIC_ANALYTICS_ENABLED=true and redeploy.
          PUBLIC_ANALYTICS_ENABLED: ${{ vars.PUBLIC_ANALYTICS_ENABLED }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
