name: payment-links-monitor

# Watches the purchase-path contracts (and the support-mail MX records)
# so a dead Buy button is detected within a day — not by a customer at
# the moment of purchase intent. See docs/licensing.md ("Payment-link
# contract"). Deliberately NOT a per-PR check: these are external
# dependencies and would make merges flaky.
#
# Note: GitHub auto-disables scheduled workflows after ~60 days of repo
# inactivity — the release.sh preflight runs the same checks as a backstop.

on:
  schedule:
    - cron: "17 6 * * *" # daily, off the top-of-hour load spike
  workflow_dispatch:

jobs:
  buy-redirect:
    name: drobu.app/buy -> Stripe (static redirect page)
    runs-on: ubuntu-latest
    steps:
      - name: Assert the /buy page loads and points at the contract link
        run: |
          # /buy is a static page on GitHub Pages (drobu.app), not a server
          # 302 — Pages can't issue a 30x. It meta-refresh/JS-redirects to
          # the Stripe Payment Link. Follow the trailing-slash redirect,
          # require 200, and pin the EXACT Stripe URL in the body so a
          # hijacked or retargeted redirect alerts.
          expected="https://buy.stripe.com/14A7sL2rkeKx6sj3QNdnW01"
          code=$(curl -sL -o /tmp/buy.html -w '%{http_code}' --max-time 15 https://drobu.app/buy)
          echo "got: $code"
          if [ "$code" != "200" ]; then
            echo "::error::drobu.app/buy returned '$code', not 200 — Buy buttons in shipped binaries are dead"
            exit 1
          fi
          if ! grep -qF "$expected" /tmp/buy.html; then
            echo "::error::/buy does not contain the contract Payment Link — a hijacked or retargeted redirect must alert (update this pin only on a deliberate contract change)"
            exit 1
          fi
          echo "buy page + target OK"

  stripe-link:
    name: bare Stripe link alive (never-deactivate contract)
    runs-on: ubuntu-latest
    steps:
      - name: Assert the checkout shell is served
        run: |
          # Binaries v1.2-v1.5.2 carry this URL baked in — it must never die.
          # The live page is the ~500KB Stripe Checkout shell with a
          # "livemode" marker; product data renders client-side, so no
          # product-name assertion is possible. TODO(runbook): capture a
          # deactivated test link's response empirically and tighten this.
          out=$(curl -s -o /tmp/checkout.html -w '%{http_code} %{size_download}' --max-time 30 \
            -A "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" \
            "https://buy.stripe.com/14A7sL2rkeKx6sj3QNdnW01")
          echo "got: $out"
          code=${out%% *}
          size=${out#* }
          if [ "$code" != "200" ]; then
            echo "::error::Stripe Payment Link answered $code — old binaries' Buy buttons depend on this link"
            exit 1
          fi
          if [ "$size" -lt 100000 ]; then
            echo "::error::Stripe response is only ${size} bytes — not the checkout shell; the link may be deactivated"
            exit 1
          fi
          grep -q "livemode" /tmp/checkout.html || {
            echo "::error::checkout shell missing the livemode marker — page shape changed, verify the link manually"
            exit 1
          }

  support-mx:
    name: support@drobu.app MX records
    runs-on: ubuntu-latest
    steps:
      - name: Assert Hostinger email MX
        run: |
          mx=$(dig +short MX drobu.app)
          echo "MX: $mx"
          echo "$mx" | grep -q "hostinger.com" || {
            echo "::error::drobu.app MX records missing or not Hostinger email — support mail (printed in shipped binaries) will bounce"
            exit 1
          }

  webhook-health:
    name: license-fulfillment webhook + pool + Stripe endpoint config
    runs-on: ubuntu-latest
    steps:
      - name: Assert webhook health and pool depth
        run: |
          # The fulfillment webhook vends pre-signed license keys on Stripe
          # payments. Two silent-death classes are checked here:
          #   1. this step — function unreachable / pool starving
          #   2. next step — Stripe-side endpoint config drift (the failure
          #      no self-health-check can see: a disabled endpoint delivers
          #      NOTHING, forever, silently)
          # DROBU_WEBHOOK_HEALTH_URL is a repo *variable* (the URL is not a
          # secret); set during the fulfillment rollout. Missing config is
          # RED, not skipped — an unmonitored payment path must be loud.
          set -euo pipefail
          url="${{ vars.DROBU_WEBHOOK_HEALTH_URL }}"
          if [ -z "$url" ]; then
            echo "::error::DROBU_WEBHOOK_HEALTH_URL repo variable not set — the fulfillment webhook is unmonitored (set it to https://<project-ref>.supabase.co/functions/v1/stripe-webhook/health per the rollout checklist)"
            exit 1
          fi
          body=$(mktemp)
          code=$(curl -s -o "$body" -w '%{http_code}' --max-time 30 --retry 3 --retry-delay 2 --retry-all-errors "${url}?cb=$(date +%s)$RANDOM") || code=000
          echo "health: $code"
          if [ "$code" != "200" ]; then
            echo "::error::fulfillment webhook health returned $code — paying customers stop receiving license keys (Stripe retries 72h; runbook: Automated fulfillment)"
            exit 1
          fi
          pool=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("pool",""))' "$body") || pool=""
          echo "pool bucket: $pool"
          if [ "$pool" != "ok" ]; then
            echo "::error::license pool bucket is '$pool' — refill NOW with tools/mint-license-pool.sh (an empty pool strands paying customers on Stripe retries)"
            exit 1
          fi

      - name: Assert Stripe webhook endpoint config (drift detection)
        run: |
          # A restricted READ-ONLY Stripe key (scope: Webhook Endpoints,
          # read) — the deliberate, narrow exception to the no-secrets-in-CI
          # posture. It buys detection of the one failure class that is
          # invisible from our side: Stripe disabling, deleting, or
          # re-pointing the endpoint. An auth failure is RED, never skipped —
          # a rotated-away monitor key must not silently disable this check.
          set -euo pipefail
          key="${{ secrets.STRIPE_MONITOR_KEY }}"
          health_url="${{ vars.DROBU_WEBHOOK_HEALTH_URL }}"
          if [ -z "$key" ] || [ -z "$health_url" ]; then
            echo "::error::STRIPE_MONITOR_KEY secret or DROBU_WEBHOOK_HEALTH_URL variable not set — Stripe endpoint drift is undetected (set both per the rollout checklist)"
            exit 1
          fi
          endpoint_url="${health_url%/health}"
          resp=$(mktemp)
          code=$(curl -s -o "$resp" -w '%{http_code}' --max-time 30 --retry 3 --retry-delay 2 --retry-all-errors -u "${key}:" "https://api.stripe.com/v1/webhook_endpoints?limit=100") || code=000
          echo "stripe api: $code"
          if [ "$code" = "401" ]; then
            echo "::error::Stripe rejected the monitor key (401) — STRIPE_MONITOR_KEY was rotated or revoked; re-create the restricted read-only key and update the GitHub secret"
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::error::Stripe webhook_endpoints list returned $code — endpoint drift is unverifiable right now"
            exit 1
          fi
          python3 - "$resp" "$endpoint_url" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1]))
          target = sys.argv[2]
          eps = [e for e in data.get("data", []) if e.get("url") == target]
          if len(eps) != 1:
              print(f"::error::expected exactly one Stripe endpoint at {target}, found {len(eps)} — fulfillment events are not being delivered as configured")
              sys.exit(1)
          ep = eps[0]
          if ep.get("status") != "enabled":
              print(f"::error::Stripe endpoint at {target} is '{ep.get('status')}', not enabled — NO fulfillment events are delivered (customers pay, no key arrives); re-enable in the Stripe dashboard and resend missed events")
              sys.exit(1)
          want = sorted([
              "checkout.session.completed",
              "checkout.session.async_payment_succeeded",
              "checkout.session.async_payment_failed",
          ])
          got = sorted(ep.get("enabled_events", []))
          if got != want:
              print(f"::error::Stripe endpoint event set drifted: {got} != {want} — delayed-payment fulfillment may silently break")
              sys.exit(1)
          print("endpoint enabled, URL pinned, event set exact")
          PY

  appcast-health:
    name: Sparkle appcast reachable on both feed URLs
    runs-on: ubuntu-latest
    steps:
      - name: Assert both appcast URLs serve a parseable feed
        run: |
          # Sparkle treats an appcast load failure as "no update available"
          # with NO error UI — a dead feed strands every installed client
          # silently (this exact class went unnoticed for weeks after the
          # repo rename stranded v1.2). Two URLs are contracts:
          #   canonical:  https://drobu.app/appcast.xml
          #   legacy:     https://danieliusisiunas.github.io/drobu/appcast.xml
          # The legacy URL is the SUFeedURL baked into EVERY shipped binary
          # (Sources/DrobuCore/Info.plist) and survives only via the
          # custom-domain 301 — if that chain breaks, all installed clients
          # go dark even while the canonical URL stays green.
          # Cache-busted per request (Pages sits behind Fastly, max-age=600;
          # each query-string variant is itself cached).
          set -euo pipefail
          enclosure_url=""
          # Each feed's latest item, captured per-iteration as the FULL
          # enclosure metadata Sparkle clients consume:
          # "<shortVersionString>|<url>|<length>|<edSignature>". Both feeds
          # must advertise an identical latest item — not just the same
          # version/URL. A legacy github.io feed that drifts (a stale copy,
          # OR an in-place correction like a re-signed DMG / fixed length
          # that reached canonical but not legacy) would otherwise pass
          # green while legacy-SUFeedURL clients reject the download or stay
          # stranded. Comparing version+URL alone misses the length/sig case.
          declare -a latest_items=()
          for feed in "https://drobu.app/appcast.xml" "https://danieliusisiunas.github.io/drobu/appcast.xml"; do
            body=$(mktemp)
            code=$(curl -sL -o "$body" -w '%{http_code}' --max-time 30 --retry 3 --retry-delay 2 --retry-all-errors "${feed}?cb=$(date +%s)$RANDOM") || code=000
            echo "$feed -> $code"
            if [ "$code" != "200" ]; then
              echo "::error::appcast at $feed returned $code — installed clients silently see no updates (the v1.2 stranding class)"
              exit 1
            fi
            item=$(python3 - "$body" <<'PY'
          import sys, xml.etree.ElementTree as ET
          SP = "{http://www.andymatuschak.org/xml-namespaces/sparkle}"
          first = ET.parse(sys.argv[1]).findall(".//item")[0]
          enc = first.find("enclosure")
          print("|".join([
              first.findtext(f"{SP}shortVersionString") or "",
              enc.get("url") or "",
              enc.get("length") or "",
              enc.get(f"{SP}edSignature") or "",
          ]))
          PY
            ) || {
              echo "::error::appcast at $feed does not parse as XML — to Sparkle clients a broken appcast is indistinguishable from 'no updates'"
              exit 1
            }
            echo "  latest: $item"
            latest_items+=("$item")
            enclosure_url=$(echo "$item" | cut -d'|' -f2)
          done

          # The two feeds must agree on the FULL latest enclosure (version,
          # URL, length, signature). Divergence means the legacy SUFeedURL
          # clients bake is serving a different feed than canonical — the
          # silent-stranding class (stale feed, or a length/sig mismatch that
          # makes legacy clients reject an otherwise-correct download).
          if [ "${latest_items[0]}" != "${latest_items[1]}" ]; then
            echo "::error::canonical and legacy appcast feeds disagree on the latest enclosure — clients on the baked-in github.io SUFeedURL get a stale or unverifiable update. canonical='${latest_items[0]}' legacy='${latest_items[1]}'"
            exit 1
          fi

          # The latest enclosure must be downloadable, and the stable
          # latest/download alias (the website Download button) must redirect.
          enc_code=$(curl -sIL -o /dev/null -w '%{http_code}' --max-time 30 --retry 3 --retry-delay 2 --retry-all-errors "$enclosure_url") || enc_code=000
          echo "enclosure HEAD: $enc_code ($enclosure_url)"
          if [ "$enc_code" != "200" ]; then
            echo "::error::latest enclosure ($enclosure_url) returned $enc_code — every Sparkle update download fails"
            exit 1
          fi
          hop=$(curl -s -o /dev/null -w '%{redirect_url}' --max-time 15 --retry 3 --retry-delay 2 --retry-all-errors "https://github.com/DanieliusIsiunas/drobu/releases/latest/download/Drobu.dmg") || hop=""
          echo "latest/download first hop: $hop"
          case "$hop" in
            https://github.com/DanieliusIsiunas/drobu/releases/download/*) echo "alias OK" ;;
            *)
              echo "::error::releases/latest/download/Drobu.dmg has no version-bearing redirect — the website Download button is broken"
              exit 1
              ;;
          esac
