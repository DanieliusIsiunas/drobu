name: Tests

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', 'website/**', 'Resources/**']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', 'website/**', 'Resources/**']

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          # Cache key includes the repo name because the SPM artifacts
          # directory bakes absolute workspace paths into its metadata.
          # When the repo was renamed (clipboard-history → drobu) the
          # cached `.build/artifacts/sparkle/...` Info.plist references
          # the old path and `swift test` fails to find Sparkle.xcframework.
          # Including ${{ github.event.repository.name }} forces a fresh
          # cache after any rename without forcing one on every PR.
          key: ${{ runner.os }}-spm-${{ github.event.repository.name }}-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-${{ github.event.repository.name }}-

      - run: swift test
